<!DOCTYPE html>
<html>
<head>
    <title>Debug Entity Extraction</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Debug Entity Extraction</h1>
    
    <button onclick="testExtraction()">Test Entity Extraction</button>
    
    <div id="result"></div>
    
    <script>
        async function testExtraction() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            const testContent = "John Smith works at Microsoft. Sarah Johnson is the CTO of Apple Inc.";
            
            try {
                const response = await fetch('/api/extract-entities', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ content: testContent })
                });
                
                const text = await response.text();
                console.log('Raw response:', text);
                
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    throw new Error('Failed to parse response: ' + text);
                }
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>Success!</h3>
                            <p>Found ${data.entities.length} entities:</p>
                            <pre>${JSON.stringify(data.entities, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>Error</h3>
                            <p>${data.error || 'Unknown error'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }
        
        // Also check if EntityIndexer is available
        setTimeout(() => {
            if (window.app && window.app.entityIndexer) {
                console.log('EntityIndexer is available');
                console.log('Current stats:', window.app.entityIndexer.getIndexStats());
            } else {
                console.log('EntityIndexer not found');
            }
        }, 2000);
    </script>
</body>
</html>
